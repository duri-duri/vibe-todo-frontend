<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할일 목록</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>할일 목록</h1>
      <p class="subtitle">오늘 할 일을 관리하세요</p>
    </header>

    <div id="apiError" class="error-message" role="alert" aria-live="polite"></div>
    <section class="input-section">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="새 할일을 입력하세요..."
        maxlength="200"
        autocomplete="off"
      />
      <button type="button" id="addBtn" class="btn btn-add">추가</button>
    </section>

    <section class="filters">
      <button type="button" class="filter-btn active" data-filter="all">전체</button>
      <button type="button" class="filter-btn" data-filter="active">진행중</button>
      <button type="button" class="filter-btn" data-filter="done">완료</button>
    </section>

    <div id="emptyState" class="empty-state">할일이 없습니다. 위에서 새 할일을 추가해 보세요.</div>
    <ul id="todoList" class="todo-list"></ul>

    <footer class="footer">
      <span id="todoCount" class="count">할일 0개</span>
    </footer>
  </div>

  <!-- 수정 모달 -->
  <div id="editModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h2>할일 수정</h2>
      <input
        type="text"
        id="editInput"
        class="todo-input"
        placeholder="수정할 내용..."
        maxlength="200"
        autocomplete="off"
      />
      <div class="modal-actions">
        <button type="button" id="cancelEditBtn" class="btn btn-cancel">취소</button>
        <button type="button" id="saveEditBtn" class="btn btn-save">저장</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
  <footer style="position:fixed;bottom:0;right:0;font-size:10px;color:#666;padding:4px 8px;background:#f5f5f5;">

  </footer>
</body>
</html>
